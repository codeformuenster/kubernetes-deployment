apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: muenster-update-staging
spec:
  interval: 1h
  targetNamespace: c4m-muenster-update-staging
  sourceRef:
    kind: GitRepository
    name: codeformuenster-muenster-update
    namespace: flux-system
  path: "."
  prune: true
  images:
  - name: docker.io/codeformuenster/muenster-jetzt-frontend
    newTag: master-37865cb-1702974266 # {"$imagepolicy": "flux-system:muenster-update-frontend-staging:tag"}
  - name: docker.io/codeformuenster/muenster-jetzt-api
    newTag: master-37865cb-1702974204 # {"$imagepolicy": "flux-system:muenster-update-api-staging:tag"}
  - name: docker.io/codeformuenster/muenster-jetzt-api-static
    newTag: master-37865cb-1702974212 # {"$imagepolicy": "flux-system:muenster-update-api-static-staging:tag"}
  commonMetadata:
    labels:
      app.kubernetes.io/app: muenster-update
  patches:
  - patch: |
      - op: add
        path: /spec/ingressClassName
        value: traefik
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-c4m
    target:
      kind: Ingress
  - patch: |
      - op: add
        path: /spec/rules/0/host
        value: api.staging.muenster-update.de
      - op: add
        path: /spec/tls
        value: [{ hosts: [api.staging.muenster-update.de], secretName: api-tls }]
    target:
      kind: Ingress
      name: backend
  - patch: |
      - op: add
        path: /spec/rules/0/host
        value: staging.muenster-update.de
      - op: add
        path: /spec/tls
        value: [{ hosts: [staging.muenster-update.de], secretName: frontend-tls }]
    target:
      kind: Ingress
      name: frontend
  - patch: |
      - op: add
        path: /spec/template/metadata/labels/host
        value: api.staging.muenster-update.de
    target:
      kind: Deployment
      name: backend-api
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend-api
      spec:
        template:
          spec:
            initContainers:
            - name: migrations
              env:
              - name: DB_HOST
                valueFrom:
                  secretKeyRef:
                    name: pg-ms-update-staging-app
                    key: host
              - name: DB_PORT
                valueFrom:
                  secretKeyRef:
                    name: pg-ms-update-staging-app
                    key: port
              - name: DB_NAME
                valueFrom:
                  secretKeyRef:
                    name: pg-ms-update-staging-app
                    key: dbname
              - name: DB_USER
                valueFrom:
                  secretKeyRef:
                    name: pg-ms-update-staging-app
                    key: user
              - name: DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: pg-ms-update-staging-app
                    key: password
            containers:
            - name: backend-api
              env:
              - name: DB_HOST
                valueFrom:
                  secretKeyRef:
                    name: pg-ms-update-staging-app
                    key: host
              - name: DB_PORT
                valueFrom:
                  secretKeyRef:
                    name: pg-ms-update-staging-app
                    key: port
              - name: DB_NAME
                valueFrom:
                  secretKeyRef:
                    name: pg-ms-update-staging-app
                    key: dbname
              - name: DB_USER
                valueFrom:
                  secretKeyRef:
                    name: pg-ms-update-staging-app
                    key: user
              - name: DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: pg-ms-update-staging-app
                    key: password
    target:
      kind: Deployment
      name: backend-api
  - patch: |-
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: crawler
      spec:
        jobTemplate:
          spec:
            template:
              spec:
                containers:
                - name: crawler
                  env:
                  - name: DB_HOST
                    valueFrom:
                      secretKeyRef:
                        name: pg-ms-update-staging-app
                        key: host
                  - name: DB_PORT
                    valueFrom:
                      secretKeyRef:
                        name: pg-ms-update-staging-app
                        key: port
                  - name: DB_NAME
                    valueFrom:
                      secretKeyRef:
                        name: pg-ms-update-staging-app
                        key: dbname
                  - name: DB_USER
                    valueFrom:
                      secretKeyRef:
                        name: pg-ms-update-staging-app
                        key: user
                  - name: DB_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: pg-ms-update-staging-app
                        key: password
    target:
      kind: CronJob
      name: crawler
